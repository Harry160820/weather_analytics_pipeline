name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]

env:
  ACR_NAME: weatherpipelineacr
  RESOURCE_GROUP: weather-pipeline-rg
  ACI_PRODUCER: weather-producer
  ACI_CONSUMER: weather-consumer

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & Push Producer
        run: |
          docker build -t $ACR_NAME.azurecr.io/weather-producer:latest -f docker/producer/Dockerfile .
          az acr login --name $ACR_NAME
          docker push $ACR_NAME.azurecr.io/weather-producer:latest

      - name: Build & Push Consumer
        run: |
          docker build -t $ACR_NAME.azurecr.io/weather-consumer:latest -f docker/consumer/Dockerfile .
          docker push $ACR_NAME.azurecr.io/weather-consumer:latest

      - name: Deploy Producer to ACI (optional)
        run: |
          az container create \
            --resource-group $RESOURCE_GROUP \
            --name $ACI_PRODUCER \
            --image $ACR_NAME.azurecr.io/weather-producer:latest \
            --registry-login-server $ACR_NAME.azurecr.io \
            --registry-username $ACR_NAME \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --cpu 1 --memory 1 \
            --restart-policy Always \
            --environment-variables \
              EVENTHUB_CONNECTION_STRING="${{ secrets.EVENTHUB_CONNECTION_STRING }}" \
              EVENTHUB_NAME="weather-raw" \
            --location centralindia || echo "Container already exists, updating..."
          az container restart --name $ACI_PRODUCER --resource-group $RESOURCE_GROUP || echo "Restart failed, may already be running"
services:

  postgres:
    image: postgres:14
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    volumes:
      - postgres-airflow:/var/lib/postgresql/data

    networks:
      - weather-net


  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-init

    depends_on:
      - postgres

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ""

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true
      "

    networks:
      - weather-net



  airflow-webserver:

    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-webserver

    depends_on:
      - postgres
      - airflow-init

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "secret-key"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./producer:/opt/airflow/producer
      - ./consumer:/opt/airflow/consumer
      - ./hive:/opt/airflow/hive-init

    ports:
      - "0.0.0.0:8080:8080"

    command:
      webserver

    networks:
      - weather-net



  airflow-scheduler:

    build:
      context: .
      dockerfile: docker/airflow/Dockerfile

    container_name: airflow-scheduler

    depends_on:
      - airflow-webserver

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./producer:/opt/airflow/producer
      - ./consumer:/opt/airflow/consumer
      - ./hive:/opt/airflow/hive-init

    command:
      scheduler

    networks:
      - weather-net



volumes:
  postgres-airflow:


networks:
  weather-net:
    driver: bridge
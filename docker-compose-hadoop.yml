version: "3.8"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=weather-cluster
    env_file:
      - hadoop.env
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode:/hadoop/dfs/name
    networks:
      - hadoop-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - hadoop.env
    volumes:
      - datanode:/hadoop/dfs/data
    networks:
      - hadoop-net

  hive:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive
    hostname: hive
    depends_on:
      - namenode
    environment:
      HIVE_SITE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      HIVE_SITE_CONF_hive_metastore_uris: ""
      HIVE_SITE_CONF_hive_metastore_dbtype: derby
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:derby:;databaseName=/opt/hive/metastore_db;create=true"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.apache.derby.jdbc.EmbeddedDriver
      SERVICE_PRECONDITION: ""
    ports:
      - "10000:10000"
      - "10002:10002"
    networks:
      - hadoop-net

  weather-consumer:
    build:
      context: ./consumer-eventhub-hdfs
      dockerfile: Dockerfile
    container_name: weather-consumer
    depends_on:
      - namenode
      - datanode
    environment:
      EVENTHUB_CONNECTION_STRING: "${EVENTHUB_CONNECTION_STRING}"
      EVENTHUB_NAME: "${EVENTHUB_NAME}"
      HDFS_NAMENODE: "hdfs://namenode:9000"
    networks:
      - hadoop-net
    restart: unless-stopped

volumes:
  namenode:
  datanode:

networks:
  hadoop-net:
    driver: bridge